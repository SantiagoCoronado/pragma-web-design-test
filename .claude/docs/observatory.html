<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Observatory</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: 'SF Mono', 'Fira Code', monospace; }

  .header { padding: 16px 24px; border-bottom: 1px solid #1a1a2e; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 16px; color: #fff; letter-spacing: 2px; }
  .header .status { font-size: 12px; color: #666; }

  .dashboard { display: grid; grid-template-columns: 1fr 320px; grid-template-rows: auto 1fr; height: calc(100vh - 53px); }

  /* Stats bar */
  .stats { grid-column: 1 / -1; display: flex; gap: 0; border-bottom: 1px solid #1a1a2e; }
  .stat { flex: 1; padding: 12px 20px; border-right: 1px solid #1a1a2e; }
  .stat .label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  .stat .value { font-size: 24px; font-weight: bold; margin-top: 4px; }
  .stat .value.green { color: #4ade80; }
  .stat .value.yellow { color: #facc15; }
  .stat .value.orange { color: #fb923c; }
  .stat .value.red { color: #f87171; }

  /* Tree view */
  .tree-container { overflow: auto; padding: 20px; }

  .agent-node { margin: 0 0 2px 0; }
  .agent-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: background 0.15s; }
  .agent-header:hover { background: #1a1a2e; }
  .agent-header .indicator { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .agent-header .indicator.active { background: #3b82f6; animation: pulse 2s infinite; }
  .agent-header .indicator.completed { background: #4ade80; }
  .agent-header .indicator.failed { background: #f87171; }
  .agent-header .name { font-weight: 600; font-size: 13px; }
  .agent-header .meta { font-size: 11px; color: #666; margin-left: auto; }

  .agent-children { margin-left: 20px; border-left: 1px solid #1a1a2e; padding-left: 12px; }

  .agent-details { margin: 4px 0 4px 32px; font-size: 11px; }
  .event-line { padding: 2px 0; color: #888; display: flex; gap: 8px; }
  .event-line .time { color: #555; min-width: 60px; }
  .event-line .icon { min-width: 16px; text-align: center; }
  .event-line .tool { color: #a78bfa; }
  .event-line .file { color: #67e8f9; }
  .event-line .skill { color: #fbbf24; }

  /* Right panel */
  .panel { border-left: 1px solid #1a1a2e; overflow-y: auto; }
  .panel-section { padding: 16px; border-bottom: 1px solid #1a1a2e; }
  .panel-section h3 { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }

  /* Throttle gauge */
  .gauge { height: 8px; background: #1a1a2e; border-radius: 4px; overflow: hidden; margin-top: 8px; }
  .gauge-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
  .gauge-fill.green { background: #4ade80; }
  .gauge-fill.yellow { background: #facc15; }
  .gauge-fill.orange { background: #fb923c; }
  .gauge-fill.red { background: #f87171; }

  .sensor { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
  .sensor .label { color: #888; }

  /* Event feed */
  .feed { max-height: 300px; overflow-y: auto; }
  .feed-event { padding: 6px 0; border-bottom: 1px solid #0f0f1a; font-size: 11px; }
  .feed-event .feed-time { color: #555; }
  .feed-event .feed-type { color: #a78bfa; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>
</head>
<body>

<div class="header">
  <h1>AGENT OBSERVATORY</h1>
  <div class="status" id="connection-status">Connecting...</div>
</div>

<div class="dashboard">
  <div class="stats" id="stats-bar">
    <div class="stat"><div class="label">Agents</div><div class="value" id="stat-agents">0</div></div>
    <div class="stat"><div class="label">Active</div><div class="value green" id="stat-active">0</div></div>
    <div class="stat"><div class="label">Completed</div><div class="value" id="stat-completed">0</div></div>
    <div class="stat"><div class="label">Failed</div><div class="value" id="stat-failed">0</div></div>
    <div class="stat"><div class="label">Tools</div><div class="value" id="stat-tools">0</div></div>
    <div class="stat"><div class="label">Files</div><div class="value" id="stat-files">0</div></div>
    <div class="stat"><div class="label">Throttle</div><div class="value" id="stat-throttle">--</div></div>
  </div>

  <div class="tree-container" id="tree"></div>

  <div class="panel">
    <div class="panel-section">
      <h3>Throttle</h3>
      <div class="gauge"><div class="gauge-fill green" id="throttle-gauge" style="width: 0%"></div></div>
      <div style="margin-top: 12px">
        <div class="sensor"><span class="label">Score</span><span id="t-score">--</span></div>
        <div class="sensor"><span class="label">Model</span><span id="t-model">--</span></div>
        <div class="sensor"><span class="label">Die Temp</span><span id="t-die">--</span></div>
        <div class="sensor"><span class="label">Battery</span><span id="t-battery">--</span></div>
        <div class="sensor"><span class="label">Memory</span><span id="t-memory">--</span></div>
        <div class="sensor"><span class="label">Constraint</span><span id="t-dominant">--</span></div>
      </div>
    </div>

    <div class="panel-section">
      <h3>Live Feed</h3>
      <div class="feed" id="feed"></div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:7777/api';
let lastEventCount = 0;

function scoreColor(score) {
  if (score < 0.25) return 'green';
  if (score < 0.5) return 'yellow';
  if (score < 0.75) return 'orange';
  return 'red';
}

function renderNode(node, allNodes) {
  const children = node.children || [];
  const childNodes = children.map(cid => allNodes.find(n => n.id === cid)).filter(Boolean);

  const toolLines = (node.tools || []).slice(-5).map(t =>
    `<div class="event-line"><span class="time">${(t.ts||'').slice(11,19)}</span><span class="icon">🔧</span><span class="tool">${t.tool}</span> ${t.detail || ''}</div>`
  ).join('');

  const fileLines = (node.files || []).slice(-5).map(f => {
    const short = (f.path || '').split('/').slice(-2).join('/');
    return `<div class="event-line"><span class="time">${(f.ts||'').slice(11,19)}</span><span class="icon">📄</span><span class="file">${f.action} ${short}</span></div>`;
  }).join('');

  const duration = node.start && node.end
    ? `${Math.round((new Date(node.end) - new Date(node.start)) / 1000)}s`
    : node.start ? `${Math.round((Date.now() - new Date(node.start)) / 1000)}s...` : '';

  return `
    <div class="agent-node">
      <div class="agent-header" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
        <div class="indicator ${node.status}"></div>
        <span class="name">${node.name}</span>
        <span class="meta">${duration}</span>
      </div>
      <div class="agent-details" style="display: ${node.status === 'active' ? 'block' : 'none'}">
        ${toolLines}${fileLines}
      </div>
      ${childNodes.length ? `<div class="agent-children">${childNodes.map(c => renderNode(c, allNodes)).join('')}</div>` : ''}
    </div>`;
}

async function updateTree() {
  try {
    const res = await fetch(`${API}/tree`);
    const tree = await res.json();
    const stats = tree.stats || {};

    document.getElementById('stat-agents').textContent = stats.total_agents || 0;
    document.getElementById('stat-active').textContent = stats.active || 0;
    document.getElementById('stat-completed').textContent = stats.completed || 0;
    document.getElementById('stat-failed').textContent = stats.failed || 0;
    document.getElementById('stat-tools').textContent = stats.tools_called || 0;
    document.getElementById('stat-files').textContent = stats.files_accessed || 0;

    const failEl = document.getElementById('stat-failed');
    failEl.className = 'value' + ((stats.failed || 0) > 0 ? ' red' : '');

    // Render tree — find root nodes (no parent)
    const nodes = tree.nodes || [];
    const childIds = new Set();
    (tree.edges || []).forEach(e => childIds.add(e.to));
    const roots = nodes.filter(n => !childIds.has(n.id));

    document.getElementById('tree').innerHTML = roots.length
      ? roots.map(r => renderNode(r, nodes)).join('')
      : '<div style="color:#444;padding:40px;text-align:center">No active agents. Drop tasks in Queue/ and run /dispatch.</div>';

    document.getElementById('connection-status').textContent = `Updated ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    document.getElementById('connection-status').textContent = 'Disconnected — start server: uv run trace.py --serve';
  }
}

async function updateThrottle() {
  try {
    const res = await fetch(`${API}/throttle`);
    const t = await res.json();
    const score = t.score || 0;
    const color = scoreColor(score);
    const r = t.readings || {};

    document.getElementById('stat-throttle').textContent = score.toFixed(2);
    document.getElementById('stat-throttle').className = 'value ' + color;
    document.getElementById('throttle-gauge').style.width = `${score * 100}%`;
    document.getElementById('throttle-gauge').className = 'gauge-fill ' + color;
    document.getElementById('t-score').textContent = `${score.toFixed(2)} (${t.dominant_constraint || '?'})`;
    document.getElementById('t-model').textContent = t.model || '--';
    document.getElementById('t-die').textContent = r.die_temp_c ? `${r.die_temp_c.toFixed(1)}°C` : '--';
    document.getElementById('t-battery').textContent = r.battery_pct != null ? `${r.battery_pct}% ${r.is_charging ? '⚡' : '🔋'}` : '--';
    document.getElementById('t-memory').textContent = r.memory_pct ? `${r.memory_pct.toFixed(0)}%` : '--';
    document.getElementById('t-dominant').textContent = t.dominant_constraint || '--';
  } catch (e) { /* skip */ }
}

async function updateFeed() {
  try {
    const res = await fetch(`${API}/events`);
    const events = await res.json();
    if (events.length === lastEventCount) return;
    lastEventCount = events.length;

    const icons = {
      agent_spawned: '🔵', agent_completed: '✅', agent_failed: '❌',
      tool_called: '🔧', file_accessed: '📄', task_claimed: '📋',
      skill_invoked: '⚡', dispatch_start: '🚀', dispatch_end: '🏁',
      bootstrap_start: '🔄', bootstrap_end: '✅', learn_captured: '🧠',
      throttle_checked: '🌡️', research_started: '🔍',
    };

    const feed = document.getElementById('feed');
    feed.innerHTML = events.slice(-30).reverse().map(e => {
      const time = (e.ts || '').slice(11, 19);
      const icon = icons[e.type] || '•';
      const detail = e.data?.detail || e.data?.tool || e.data?.path || '';
      return `<div class="feed-event"><span class="feed-time">${time}</span> ${icon} <span class="feed-type">${e.type}</span> ${detail}</div>`;
    }).join('');
  } catch (e) { /* skip */ }
}

// Poll every 2 seconds
setInterval(updateTree, 2000);
setInterval(updateThrottle, 5000);
setInterval(updateFeed, 2000);
updateTree();
updateThrottle();
updateFeed();
</script>
</body>
</html>
